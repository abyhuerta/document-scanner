<h1>{{ documentData()?.fileName }}</h1>
@if (fileURL(); as url) {
  <iframe [src]="url" class="pdf-viewer"></iframe>
}
@else {
  <div class="skeleton-loader">
     <mat-spinner class="img-loader"></mat-spinner>
  </div>
}

<button class="btn btn-primary" type="submit" (click)="downloadFile()"><i class="bi bi-download"></i> download</button>
