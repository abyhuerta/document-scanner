<div class="docs-page">

  <h1>My Documents</h1>

  @if (processedDocs().length === 0) {
    <div class="empty-state">
      <i class="bi bi-folder-x"></i>
      <p>No documents yet</p>
      <a routerLink="/uploadFile" class="empty-cta">
        <i class="bi bi-camera-fill"></i> Scan your first document
      </a>
    </div>
  } @else {
    <div class="docs-list">
      @for (doc of processedDocs(); track doc.id; let i = $index) {
        <div class="doc-card" (click)="onFileClick(doc)">
          <div class="doc-icon">
            <i class="bi bi-file-earmark-pdf-fill"></i>
          </div>
          <div class="doc-info">
            <div class="doc-name">{{ doc.fileName }}</div>
            <div class="doc-meta">
              @if (doc.tag) {
                <span class="doc-tag">{{ doc.tag }}</span>
              }
              <span class="doc-status" [class.status-done]="doc.status === 'processed'">
                {{ doc.status }}
              </span>
            </div>
          </div>
          <i class="bi bi-chevron-right doc-chevron"></i>
        </div>
      }
    </div>
  }

</div>
